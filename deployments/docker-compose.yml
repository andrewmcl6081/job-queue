services:
  postgres:
    image: postgres:16
    container_name: jobqueue-postgres
    env_file: "../.env"
    ports:
      - "5432:5432"
    volumes:
      - jobqueue-postgres-data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: jobqueue-redis
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - jobqueue-redis-data:/data
  
volumes:
  jobqueue-postgres-data:
  jobqueue-redis-data: