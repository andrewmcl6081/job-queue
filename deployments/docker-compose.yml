services:
    postgres:
        image: postgres:16
        container_name: jobqueue-postgres
        env_file: "../.env"
        ports:
            - "5432:5432"
        volumes:
            - jobqueue-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

    redis:
        image: redis:7
        container_name: jobqueue-redis
        command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
        ports:
            - "6379:6379"
        volumes:
            - jobqueue-redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s

volumes:
    jobqueue-postgres-data:
    jobqueue-redis-data:
